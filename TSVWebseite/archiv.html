    <div class="settings">
  <button id="settingsBtn" class="settings-btn">⚙ Design</button>
  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span>Dark Mode</span>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="theme-slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <span>Schriftgröße</span>
      <select id="fontSizeSelect">

  </div>

<main class="archive-page">
  <section class="archive-hero">
    <div class="slider-container" id="archiveHighlightSlider">
      <div class="loader">Lade Highlights...</div>
    </div>
  </section>

 <section class="filter-section card">
  <div class="filter-row">
    <div class="filter-group">
      <small>Kategorie:</small>
      <div class="filter-bar">
        <button data-archive-filter="all" class="btn small active">Alle</button>
        <button data-archive-filter="Spiele" class="btn small">Spiele</button>
        <button data-archive-filter="Highlights" class="btn small">Highlights</button>
        <button data-archive-filter="Feiern" class="btn small">Feiern</button>
        <button data-archive-filter="Sonstige" class="btn small">Sonstige</button>
      </div>
    </div>

    <div class="filter-group">
  <small>Anzeige-Typ:</small>
  <div class="type-switcher">
    <input type="radio" name="typeFilter" id="type-all" value="all" checked>
    <label for="type-all">Alle</label>
    <input type="radio" name="typeFilter" id="type-news" value="news">
    <label for="type-news">News</label>
    <input type="radio" name="typeFilter" id="type-artikel" value="artikel">
    <label for="type-artikel">Archiv</label>
    <div class="switch-selection"></div>
  </div>
</div>

<div class="filter-group">
  <small>Sortierung:</small>
  <div class="type-switcher sort-switcher">
    <input type="radio" name="sortOrder" id="sort-desc" value="desc" checked>
    <label for="sort-desc">Neueste</label>
    <input type="radio" name="sortOrder" id="sort-asc" value="asc">
    <label for="sort-asc">Älteste</label>
    <div class="switch-selection"></div>
  </div>
</div>
</section>

  <div id="archive-grid" class="archive-grid">
    </div>
    <div id="detail-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
        <button class="modal-close-btn">&times;</button>
        
        <div class="modal-header">
            <img id="modal-img" src="" alt="">
        </div>
        <div class="modal-body">
            <span id="modal-date" class="badge"></span>
            <h2 id="modal-title"></h2>
            <div id="modal-body-text" class="article-text"></div>
        </div>
    </div>
</div>
</main>
